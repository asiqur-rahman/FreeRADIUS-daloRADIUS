# ─────────────────────────────────────────────────────────────────────
#  RADIUS clients (NAS devices) allowed to send Access-Requests.
#
#  In production the platform writes the `nas` table and FreeRADIUS
#  reads it via the SQL module — UI-driven NAS lifecycle, no SSH.
#  This file holds the bootstrap entries that must exist *before* the
#  SQL module is ready (e.g. localhost for the API's radclient CoA).
#
#  Per the architecture doc: per-NAS shared secret ≥ 32 chars in prod.
#  Replace the dev "testing123" before deploying.
# ─────────────────────────────────────────────────────────────────────

client localhost {
    ipaddr     = 127.0.0.1
    secret     = testing123
    shortname  = localhost
    nas_type   = other
}

# Docker bridge — the API container will reach FreeRADIUS over this.
client docker-net {
    ipaddr     = 172.16.0.0/12
    secret     = testing123
    shortname  = docker
    nas_type   = other
}


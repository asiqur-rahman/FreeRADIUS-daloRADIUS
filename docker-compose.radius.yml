# ─────────────────────────────────────────────────────────────────────────────
#  RADIUS LAYER — FreeRADIUS 3.2.5
#
#  Start just this layer:   docker compose -f docker-compose.db.yml \
#                                          -f docker-compose.radius.yml up -d
#  Or let COMPOSE_FILE load all three files automatically (see .env).
#
#  FreeRADIUS talks to:
#    • postgres  — SQL accounting (rlm_sql)
#    • api       — authorize / post-auth hooks (rlm_rest)
# ─────────────────────────────────────────────────────────────────────────────

services:

  freeradius:
    build:
      context: ./infra/freeradius
      dockerfile: Dockerfile
    image: radius-platform/freeradius:production
    container_name: radius-freeradius
    restart: unless-stopped
    # foreground mode — logs stream to `docker compose logs freeradius`.
    # Change to ["radiusd", "-X"] temporarily for verbose debug output.
    command: ["radiusd", "-f"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # PostgreSQL — for radacct / radpostauth SQL logging via rlm_sql.
      RADIUS_DB_HOST:     postgres
      RADIUS_DB_PORT:     5432
      RADIUS_DB_NAME:     ${POSTGRES_DB:-radius}
      RADIUS_DB_USER:     ${RADIUS_DB_USER:-radius_user}
      RADIUS_DB_PASSWORD: ${RADIUS_DB_PASSWORD:-radius_user_dev_password}
      # REST hook — rlm_rest calls the API container on the Docker bridge.
      HOOK_HOST:   ${HOOK_HOST:-api}
      HOOK_PORT:   ${HOOK_PORT:-4000}
      HOOK_SECRET: ${HOOK_SECRET:-dev-hook-secret-change-in-prod}
      # Allow direct MS-CHAP authentication (radtest / supplicants without EAP).
      # Set to "true" in development/testing; keep "false" (default) in production
      # so that only PEAP-wrapped auth is accepted.
      ALLOW_DIRECT_MSCHAP: ${ALLOW_DIRECT_MSCHAP:-false}
      # CN for the auto-generated EAP server certificate.
      # Used when no certs are present in the bind-mount or the existing key
      # is passphrase-encrypted. Set to your public hostname in production.
      RADIUS_CERT_CN: ${RADIUS_CERT_CN:-radius.local}
    volumes:
      # EAP certificates — generated by: pnpm certs:generate
      # For production swap these files with Let's Encrypt certs and restart.
      # Mounted to a staging path; the entrypoint copies them to /etc/raddb/certs
      # with correct permissions (Windows NTFS bind mounts ignore chmod).
      - ./infra/freeradius/raddb/certs:/etc/raddb/certs-src:ro
    ports:
      - "1812:1812/udp"   # Authentication   — must match AP/router RADIUS config
      - "1813:1813/udp"   # Accounting       — must match AP/router RADIUS config
      # 3799 is FreeRADIUS's own CoA listener — not used by this platform.
      # Per-NAS CoA ports live on each NAS record; the API sends Disconnect-Requests
      # directly to the AP/switch, not through FreeRADIUS.
      - "3799:3799/udp"

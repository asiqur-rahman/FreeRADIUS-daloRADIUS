# eapol_test config for PEAP-MSCHAPv2 against our radius server.
#
# Usage:
#   eapol_test -c apps/radius/test/rig/peap-mschapv2.conf \
#              -a 127.0.0.1 -p 1812 -s testing-secret -r 1
#
# Where:
#   -a / -p   server address/port (where apps/radius is listening)
#   -s        the shared secret you configured in nas_clients.secret
#             for the 127.0.0.1 NAS row (or whatever IP eapol_test runs from)
#   -r 1      one auth attempt (use -r 0 to loop forever for stress test)
#
# Prereqs:
#   1. Postgres is up:                       pnpm docker:up
#   2. A user "wifitester" exists with the password below
#   3. A NAS row exists with nasname=127.0.0.1 and the same secret
#      (or 0.0.0.0/0 for a permissive dev CIDR)
#   4. Server is running with PEAP_ENABLED=true:
#        cd apps/radius && PEAP_ENABLED=true pnpm dev

network={
  ssid="lab"
  key_mgmt=WPA-EAP
  eap=PEAP
  phase2="auth=MSCHAPV2"

  identity="wifitester"
  password="wifitester-strong-password"

  # Don't validate the server cert in dev — production deployments
  # must turn this on with ca_cert= pointing at the EAP root.
  # phase1="peapver=0"  # uncomment to force PEAPv0 only
}

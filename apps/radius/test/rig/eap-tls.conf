# eapol_test config for EAP-TLS against our radius server.
#
# Usage:
#   eapol_test -c apps/radius/test/rig/eap-tls.conf \
#              -a 127.0.0.1 -p 1812 -s testing-secret -r 1
#
# Prereqs (in addition to the PEAP prereqs):
#   1. Generate a client cert + key (the "device" cert):
#        openssl req -x509 -newkey rsa:2048 -nodes \
#          -keyout test/rig/client-key.pem \
#          -out test/rig/client-cert.pem \
#          -days 30 -subj "/CN=wifitester-device"
#   2. SHA-256 fingerprint of that cert:
#        openssl x509 -in test/rig/client-cert.pem -noout -fingerprint -sha256 \
#          | tr -d ':' | sed 's/.*=//' | tr A-Z a-z
#   3. Register the device in the platform's user_devices table:
#        INSERT INTO user_devices (id, "userId", mac, "certFingerprint", "learnedAt", "verifiedAt")
#        VALUES (gen_random_uuid()::text, '<user-id>', 'aa:bb:cc:dd:ee:ff',
#                '<fingerprint-from-step-2>', now(), now());
#   4. Boot the server with EAP_TLS_ENABLED=true:
#        cd apps/radius && EAP_TLS_ENABLED=true pnpm dev

network={
  ssid="lab"
  key_mgmt=WPA-EAP
  eap=TLS

  identity="wifitester"
  client_cert="test/rig/client-cert.pem"
  private_key="test/rig/client-key.pem"
}

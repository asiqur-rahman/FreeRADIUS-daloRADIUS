<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary identity -->
    <title>RadiusNexus — Admin Console</title>
    <meta name="description" content="Enterprise Wi-Fi Access Control — PEAP/EAP-TLS device approval &amp; management platform" />
    <meta name="application-name" content="RadiusNexus" />
    <meta name="author" content="Md. Asiqur Rahman Khan" />

    <!-- Theme / PWA colours -->
    <meta name="theme-color" content="#09090b" />
    <meta name="msapplication-TileColor" content="#09090b" />
    <meta name="color-scheme" content="dark" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- PWA manifest (injected by vite-plugin-pwa at build time; linked manually for dev) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph (for share previews) -->
    <meta property="og:title" content="RadiusNexus — Admin Console" />
    <meta property="og:description" content="Enterprise Wi-Fi Access Control Platform" />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-slate-950 text-slate-100 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

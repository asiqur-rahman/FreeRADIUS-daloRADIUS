<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport — viewport-fit=cover for iPhone notch/Dynamic Island safe area -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary identity ─────────────────────────────────────────── -->
    <title>Nexara</title>
    <meta name="description"        content="Nexara — The Intelligent Nexus of Enterprise Wi-Fi Access Control. PEAP/EAP-TLS device approval &amp; management." />
    <meta name="application-name"   content="Nexara" />
    <meta name="author"             content="Md. Asiqur Rahman Khan" />
    <meta name="generator"          content="Vite + React" />

    <!-- ── PWA / theme colours ──────────────────────────────────────── -->
    <!-- Android Chrome picks up theme-color from the manifest; duplicate here for
         browsers that read it from <meta> (Samsung Internet, older Chrome). -->
    <meta name="theme-color"            content="#09090b" />
    <meta name="msapplication-TileColor" content="#09090b" />
    <meta name="color-scheme"           content="dark" />

    <!-- ── Favicon ──────────────────────────────────────────────────── -->
    <link rel="icon"       type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon"       type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="shortcut icon" href="/icons/icon-192.png" />

    <!-- ── iOS / iPadOS PWA ─────────────────────────────────────────── -->
    <!-- Makes the app open full-screen when launched from the home screen -->
    <meta name="apple-mobile-web-app-capable"            content="yes" />
    <!-- black-translucent = status bar overlays the app (uses safe-area insets) -->
    <meta name="apple-mobile-web-app-status-bar-style"   content="black-translucent" />
    <meta name="apple-mobile-web-app-title"              content="Nexara" />

    <!-- Apple touch icons — iOS uses the first matching size; provide both -->
    <link rel="apple-touch-icon"              href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- ── PWA manifest (vite-plugin-pwa injects at build; linked for dev) ── -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── Open Graph (share previews) ─────────────────────────────── -->
    <meta property="og:site_name"   content="Nexara" />
    <meta property="og:title"       content="Nexara — Enterprise Wi-Fi Access Control" />
    <meta property="og:description" content="The Intelligent Nexus of Enterprise Wi-Fi Access Control. PEAP/EAP-TLS device approval &amp; management." />
    <meta property="og:type"        content="website" />
    <meta property="og:image"       content="/icons/icon-512.png" />

    <!-- ── Fonts ────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-zinc-950 text-zinc-100 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

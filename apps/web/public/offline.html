<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Offline — RadiusOps</title>
    <meta name="theme-color" content="#09090b" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:        #09090b;
        --surface:   #18181b;
        --border:    #27272a;
        --text:      #f4f4f5;
        --muted:     #71717a;
        --accent:    #3b82f6;
        --accent-dk: #1d4ed8;
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
                     "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
                 env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
        padding-left: max(1.5rem, env(safe-area-inset-left));
        padding-right: max(1.5rem, env(safe-area-inset-right));
        gap: 0;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 2.5rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        text-align: center;
      }

      .icon-wrap {
        width: 72px;
        height: 72px;
        border-radius: 1rem;
        background: #1e293b;
        border: 1px solid #334155;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #64748b;
      }

      .icon-wrap svg {
        width: 36px;
        height: 36px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      h1 {
        font-size: 1.375rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      p {
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--muted);
        max-width: 320px;
      }

      .divider {
        width: 100%;
        height: 1px;
        background: var(--border);
        margin: 0.25rem 0;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.625rem 1.5rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: background 0.15s, opacity 0.15s;
        text-decoration: none;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover { background: var(--accent-dk); }

      .btn-ghost {
        background: var(--border);
        color: var(--text);
      }
      .btn-ghost:hover { background: #3f3f46; }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.625rem;
        justify-content: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        font-size: 0.75rem;
        color: var(--muted);
        background: transparent;
        padding: 0;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #52525b;
        flex-shrink: 0;
      }

      .logo {
        font-size: 0.75rem;
        color: #3f3f46;
        margin-top: 0.75rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-wrap">
        <!-- wifi-off icon -->
        <svg viewBox="0 0 24 24">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </div>

      <h1>You're offline</h1>

      <p>
        RadiusOps couldn't reach the server. Check your network connection
        and try again — your cached data is still available.
      </p>

      <div class="divider"></div>

      <div class="actions">
        <button class="btn btn-primary" onclick="location.reload()">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
          </svg>
          Try again
        </button>
        <a href="/" class="btn btn-ghost">Go home</a>
      </div>

      <div class="badge">
        <span class="dot"></span>
        No internet connection
      </div>
    </div>

    <span class="logo">RadiusOps</span>

    <script>
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
